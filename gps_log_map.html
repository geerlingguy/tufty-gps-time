<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS Track Viewer — Tufty 2350</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<style>
  :root{
    --bg: #0b0d10;
    --panel: #14171b;
    --panel-2: #1b1f24;
    --line: #2a2f36;
    --text: #e8eaed;
    --text-dim: #8a9099;
    --accent: #4d9fff;
    --mono: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --good: #35c26a;
    --bad: #ef4444;
  }
  *{ box-sizing: border-box; }
  html, body{
    margin:0; padding:0; height:100%; width:100%;
    background: var(--bg); color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
  }
  #app{
    display:flex; flex-direction: column; height:100vh; width:100vw;
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 16px; background: var(--panel);
    border-bottom: 1px solid var(--line);
    flex-shrink:0; gap: 12px; flex-wrap: wrap;
  }
  header h1{
    font-size: 14px; font-weight: 600; margin:0; letter-spacing: 0.02em;
    display:flex; align-items:center; gap:8px;
  }
  header h1 .dot{
    width:8px; height:8px; border-radius:50%;
    background: linear-gradient(135deg, var(--good), var(--bad));
    flex-shrink:0;
  }
  header .sub{ font-size:11px; color: var(--text-dim); font-family: var(--mono); }
  .controls{ display:flex; align-items:center; gap:10px; flex-wrap: wrap; }
  .btn{
    background: var(--panel-2); border:1px solid var(--line); color: var(--text);
    font-family: var(--sans); font-size: 12px; padding: 6px 12px; border-radius: 6px;
    cursor:pointer; display:flex; align-items:center; gap:6px; transition: border-color .15s;
  }
  .btn:hover{ border-color: var(--accent); }
  .btn input[type=file]{ display:none; }
  select, .metric-select{
    background: var(--panel-2); border:1px solid var(--line); color: var(--text);
    font-family: var(--sans); font-size: 12px; padding: 6px 10px; border-radius: 6px;
    cursor:pointer;
  }
  main{ flex:1; position: relative; min-height:0; }
  #map{ position:absolute; inset:0; background: #0b0d10; }
  .leaflet-container{ background: #0b0d10; font-family: var(--sans); }
  /* Defensive fallback in case leaflet.css loads late/blocked: without these,
     tiles render as inline images with baseline gaps instead of a seamless grid. */
  .leaflet-tile{ display:block !important; width:256px !important; height:256px !important; }
  .leaflet-tile-container img{ max-width:none !important; max-height:none !important; }
  .leaflet-pane, .leaflet-tile-pane, .leaflet-map-pane{ position:absolute; left:0; top:0; }

  /* Dark-theme the built-in base-layer toggle */
  .leaflet-control-layers{
    background: rgba(20,23,27,0.92) !important; backdrop-filter: blur(6px);
    border: 1px solid var(--line) !important; border-radius: 10px !important;
    color: var(--text); font-family: var(--sans); box-shadow: none !important;
    padding: 8px 10px !important;
  }
  .leaflet-control-layers label{ font-size: 12px; color: var(--text); display:flex; align-items:center; gap:6px; margin: 2px 0; }
  .leaflet-control-layers-selector{ accent-color: var(--accent); }
  .leaflet-touch .leaflet-control-layers{ border-radius: 10px !important; }

  #sidebar{
    position:absolute; top:12px; right:12px; z-index: 1000;
    background: rgba(20,23,27,0.92); backdrop-filter: blur(6px);
    border: 1px solid var(--line); border-radius: 10px;
    padding: 14px; width: 230px;
    font-family: var(--mono); font-size: 11px; color: var(--text-dim);
  }
  #sidebar h2{
    font-family: var(--sans); font-size: 11px; color: var(--text);
    text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 10px 0; font-weight:600;
  }
  .stat-row{ display:flex; justify-content:space-between; padding: 3px 0; }
  .stat-row span:last-child{ color: var(--text); }
  .legend{ margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
  .legend-bar{
    height: 10px; border-radius: 5px; margin: 8px 0 4px 0;
    background: linear-gradient(90deg, var(--good) 0%, #d4c93a 50%, var(--bad) 100%);
  }
  .legend-labels{ display:flex; justify-content:space-between; font-size:10px; }

  #tooltip{
    position:absolute; z-index:1001; pointer-events:none;
    background: rgba(20,23,27,0.96); border:1px solid var(--line); border-radius: 8px;
    padding: 8px 10px; font-family: var(--mono); font-size: 11px; color: var(--text);
    display:none; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  #tooltip .row{ display:flex; justify-content:space-between; gap:14px; }
  #tooltip .row span:last-child{ color: var(--text-dim); }
  #tooltip .fixbad{ color: var(--bad); }
  #tooltip .fixgood{ color: var(--good); }

  #dropzone{
    position:absolute; inset:0; z-index:2000; display:none;
    align-items:center; justify-content:center;
    background: rgba(11,13,16,0.85); backdrop-filter: blur(3px);
    border: 2px dashed var(--accent); margin: 10px; border-radius: 12px;
    font-family: var(--sans); font-size: 14px; color: var(--accent);
  }
  #dropzone.active{ display:flex; }

  #empty-state{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:10px; z-index: 500;
    color: var(--text-dim); font-family: var(--sans); font-size: 13px; text-align:center;
  }
  #empty-state.hidden{ display:none; }

  @media (max-width: 640px){
    #sidebar{ width: calc(100vw - 24px); }
    header h1{ font-size: 12px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1><span class="dot"></span>GPS Track Viewer</h1>
    <div class="controls">
      <span class="sub" id="filename-label">combined_gps_log-clean.csv</span>
      <label class="btn">
        Load CSV
        <input type="file" id="file-input" accept=".csv" />
      </label>
      <select id="metric-select">
        <option value="hdop">Color by HDOP</option>
        <option value="sats">Color by satellites</option>
        <option value="combined" selected>Color by HDOP + sats</option>
        <option value="fix">Color by fix type</option>
      </select>
      <select id="view-select">
        <option value="points">View: Points</option>
        <option value="heatmap">View: Heatmap</option>
      </select>
      <label class="btn" id="opacity-control" style="display:none; cursor:default; gap:8px;">
        <span style="color: var(--text-dim); font-size:11px;">Opacity</span>
        <input type="range" id="opacity-slider" min="10" max="100" value="72" style="accent-color: var(--accent); cursor:pointer;">
      </label>
      <button class="btn" id="fit-btn">Fit to track</button>
    </div>
  </header>
  <main>
    <div id="map"></div>
    <div id="empty-state">
      <div>No fix data to display.</div>
    </div>
    <div id="sidebar">
      <h2>Track summary</h2>
      <div class="stat-row"><span>Total points</span><span id="stat-total">–</span></div>
      <div class="stat-row"><span>With fix</span><span id="stat-fixed">–</span></div>
      <div class="stat-row"><span>No fix</span><span id="stat-nofix">–</span></div>
      <div class="stat-row"><span>Duration</span><span id="stat-duration">–</span></div>
      <div class="stat-row"><span>Median HDOP</span><span id="stat-hdop">–</span></div>
      <div class="stat-row"><span>Median sats</span><span id="stat-sats">–</span></div>
      <div class="legend">
        <div id="legend-title" style="font-family: var(--sans); font-size:11px; color: var(--text);">HDOP (lower = better)</div>
        <div class="legend-bar"></div>
        <div class="legend-labels"><span id="legend-min">0.8</span><span id="legend-max">poor</span></div>
      </div>
    </div>
    <div id="tooltip"></div>
    <div id="dropzone">Drop a gps_log CSV file to load it</div>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

// ---------- CSV parsing ----------
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.length > 0);
  const header = lines[0].split(',').map(h => h.trim());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    const row = {};
    header.forEach((h, idx) => { row[h] = (cols[idx] !== undefined ? cols[idx].trim() : ''); });
    rows.push(row);
  }
  return rows;
}

function toPoints(rows) {
  return rows.map(r => {
    const lat = parseFloat(r.latitude);
    const lon = parseFloat(r.longitude);
    const hdop = parseFloat(r.hdop);
    const sats = parseInt(r.sats_in_use, 10);
    const alt = parseFloat(r.altitude);
    return {
      timestamp: r.timestamp,
      lat: isNaN(lat) ? null : lat,
      lon: isNaN(lon) ? null : lon,
      fix: r.fix_quality || 'NO',
      hdop: isNaN(hdop) ? null : hdop,
      sats: isNaN(sats) ? 0 : sats,
      alt: isNaN(alt) ? null : alt,
    };
  });
}

// A point is a usable "fix" if it has coordinates AND fix_quality isn't NO.
// Rows tagged NO often just repeat the last known lat/lon (stale), so we drop them.
function usableFixes(points) {
  return points.filter(p => p.lat !== null && p.lon !== null && p.fix !== 'NO');
}

// ---------- Color scales ----------
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp01(t) { return Math.max(0, Math.min(1, t)); }

function colorForT(t) {
  // t=0 -> green (good), t=1 -> red (bad), via a warm yellow midpoint
  t = clamp01(t);
  const stops = [
    [0.00, [53, 194, 106]],   // green
    [0.5,  [212, 201, 58]],   // yellow
    [1.00, [239, 68, 68]],    // red
  ];
  let s0 = stops[0], s1 = stops[stops.length - 1];
  for (let i = 0; i < stops.length - 1; i++) {
    if (t >= stops[i][0] && t <= stops[i + 1][0]) { s0 = stops[i]; s1 = stops[i + 1]; break; }
  }
  const span = s1[0] - s0[0] || 1;
  const lt = (t - s0[0]) / span;
  const r = Math.round(lerp(s0[1][0], s1[1][0], lt));
  const g = Math.round(lerp(s0[1][1], s1[1][1], lt));
  const b = Math.round(lerp(s0[1][2], s1[1][2], lt));
  return `rgb(${r},${g},${b})`;
}

const _hdopT = (p) => clamp01(((p.hdop ?? 5) - 0.8) / (5.0 - 0.8));
const _satsT = (p) => clamp01((10 - (p.sats ?? 3)) / (10 - 3));

const METRICS = {
  hdop: {
    label: 'HDOP (lower = better)',
    minLabel: '0.8', maxLabel: '5.0+',
    t: _hdopT,
  },
  sats: {
    label: 'Satellites in use',
    minLabel: '10+', maxLabel: '3',
    t: _satsT,
  },
  combined: {
    // HDOP already reflects satellite geometry, so it's weighted higher;
    // raw satellite count is folded in too since a fix built from very
    // few satellites is less trustworthy than one built from many, even
    // at the same HDOP - a low-sat fix has less redundancy to catch a
    // single bad measurement.
    label: 'HDOP + satellites (good \u2192 poor)',
    minLabel: 'good', maxLabel: 'poor',
    t: (p) => clamp01(0.65 * _hdopT(p) + 0.35 * _satsT(p)),
  },
  fix: {
    label: 'Fix type',
    minLabel: '3D', maxLabel: '2D',
    t: (p) => p.fix === '3D' ? 0 : (p.fix === '2D' ? 1 : 0.5),
  },
};

function median(nums) {
  const arr = nums.filter(n => n !== null && !isNaN(n)).slice().sort((a, b) => a - b);
  if (!arr.length) return null;
  const mid = Math.floor(arr.length / 2);
  return arr.length % 2 ? arr[mid] : (arr[mid - 1] + arr[mid]) / 2;
}

function fmtDuration(ms) {
  const s = Math.round(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h) return `${h}h ${m}m`;
  if (m) return `${m}m ${sec}s`;
  return `${sec}s`;
}

  // Street names/labels drawn on top of the satellite imagery, since raw
  // satellite tiles have no text of their own.
  const satelliteLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 21,
    maxNativeZoom: 19,
    pane: 'shadowPane', // renders above tiles, below markers
  });

  streets.addTo(map);

  layerGroup = L.layerGroup().addTo(map);

  L.control.layers({
    'Street': streets,
    'Satellite': satellite,
  }, {}, { position: 'topleft', collapsed: false }).addTo(map);

  // Show/hide the label overlay together with the satellite base layer.
  map.on('baselayerchange', (e) => {
    if (e.name === 'Satellite') { satelliteLabels.addTo(map); }
    else { map.removeLayer(satelliteLabels); }
  });
}

function render(points) {
  const fixes = usableFixes(points);
  layerGroup.clearLayers();
  if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }

  document.getElementById('stat-total').textContent = points.length;
  document.getElementById('stat-fixed').textContent = fixes.length;
  document.getElementById('stat-nofix').textContent = points.length - fixes.length;

  const times = points.map(p => Date.parse(p.timestamp)).filter(t => !isNaN(t));
  if (times.length >= 2) {
    document.getElementById('stat-duration').textContent = fmtDuration(Math.max(...times) - Math.min(...times));
  } else {
    document.getElementById('stat-duration').textContent = '–';
  }

  const medHdop = median(fixes.map(p => p.hdop));
  const medSats = median(fixes.map(p => p.sats));
  document.getElementById('stat-hdop').textContent = medHdop !== null ? medHdop.toFixed(1) : '–';
  document.getElementById('stat-sats').textContent = medSats !== null ? medSats.toFixed(0) : '–';

  const metric = METRICS[currentMetric];
  document.getElementById('legend-title').textContent =
    metric.label + (currentView === 'heatmap' ? ' — heat = poor signal' : '');
  document.getElementById('legend-min').textContent = metric.minLabel;
  document.getElementById('legend-max').textContent = metric.maxLabel;

  if (!fixes.length) {
    emptyState.classList.remove('hidden');
    return;
  }
  emptyState.classList.add('hidden');

  if (currentView === 'heatmap') {
    renderHeatmap(fixes, metric);
  } else {
    renderPoints(fixes, metric);
  }

  const latlngs = fixes.map(p => [p.lat, p.lon]);
  map.fitBounds(L.latLngBounds(latlngs), { padding: [40, 40] });
}

function renderPoints(fixes, metric) {
  // Faint connecting line to show the walked path
  const latlngs = fixes.map(p => [p.lat, p.lon]);
  L.polyline(latlngs, { color: '#4d9fff', weight: 2, opacity: 0.25 }).addTo(layerGroup);

  fixes.forEach(p => {
    const t = metric.t(p);
    const color = colorForT(t);
    const marker = L.circleMarker([p.lat, p.lon], {
      radius: 5,
      color: color,
      fillColor: color,
      fillOpacity: 0.85,
      weight: 1,
      opacity: 0.9,
    }).addTo(layerGroup);

    marker.on('mouseover', (e) => {
      const fixClass = p.fix === '3D' ? 'fixgood' : (p.fix === '2D' ? 'fixbad' : '');
      tooltip.innerHTML = `
        <div class="row"><span>Time</span><span>${p.timestamp.replace('T', ' ').replace('Z', '')}</span></div>
        <div class="row"><span>Fix</span><span class="${fixClass}">${p.fix}</span></div>
        <div class="row"><span>HDOP</span><span>${p.hdop !== null ? p.hdop.toFixed(1) : '–'}</span></div>
        <div class="row"><span>Sats</span><span>${p.sats}</span></div>
        <div class="row"><span>Alt</span><span>${p.alt !== null ? p.alt.toFixed(1) + ' m' : '–'}</span></div>
        <div class="row"><span>Lat, Lon</span><span>${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}</span></div>
      `;
      tooltip.style.display = 'block';
    });
    marker.on('mousemove', (e) => {
      tooltip.style.left = (e.originalEvent.clientX + 14) + 'px';
      tooltip.style.top = (e.originalEvent.clientY + 14) + 'px';
    });
    marker.on('mouseout', () => { tooltip.style.display = 'none'; });
  });
}

// Bins fixes into roughly-square grid cells (~cellMeters across) and
// returns one entry per occupied cell: its center and the *average*
// badness of every fix that landed in it. This is mainly a performance
// step for QualityHeatLayer below (fewer input points for dense logs);
// see that layer's comment for why *averaging* rather than *summing*
// nearby readings is what actually fixes the red-saturation problem.
function aggregateToGrid(fixes, metric, cellMeters) {
  const lat0 = fixes.reduce((s, p) => s + p.lat, 0) / fixes.length;
  const cellLat = cellMeters / 111320;
  const cellLon = cellMeters / (111320 * Math.cos(lat0 * Math.PI / 180));

  const cells = new Map();
  fixes.forEach(p => {
    const row = Math.round(p.lat / cellLat);
    const col = Math.round(p.lon / cellLon);
    const key = row + '_' + col;
    let cell = cells.get(key);
    if (!cell) {
      cell = { latSum: 0, lonSum: 0, tSum: 0, count: 0 };
      cells.set(key, cell);
    }
    cell.latSum += p.lat;
    cell.lonSum += p.lon;
    cell.tSum += metric.t(p);
    cell.count += 1;
  });

  return Array.from(cells.values()).map(c => ({
    lat: c.latSum / c.count,
    lon: c.lonSum / c.count,
    avgT: c.tSum / c.count,
    count: c.count,
  }));
}

// A "quality" heatmap: at every pixel, take a Gaussian-weighted AVERAGE of
// nearby cells' badness (0=good, 1=poor) and color that average directly.
// This is deliberately not a density heatmap (like leaflet.heat, which
// sums nearby intensities) - summing means a cluster of samples in a
// good-signal spot you lingered near can out-accumulate a sparser cluster
// of genuinely bad readings and paint the good spot red anyway. Averaging
// can't saturate that way: a pixel surrounded only by green cells always
// averages to green, no matter how many of them there are.
const QualityHeatLayer = L.Layer.extend({
  initialize: function (cells, options) {
    this._cells = cells; // [{lat, lon, avgT}]
    L.setOptions(this, options);
  },

  onAdd: function (map) {
    this._map = map;
    this._canvas = L.DomUtil.create('canvas', 'quality-heat-canvas');
    this._canvas.style.position = 'absolute';
    this._canvas.style.pointerEvents = 'none';
    // Cheap smoothing over the render grid's stepped edges - much
    // cheaper than shrinking the step size further to get the same effect.
    this._canvas.style.filter = 'blur(2px)';
    map.getPanes().overlayPane.appendChild(this._canvas);
    map.on('moveend zoomend resize', this._reset, this);
    this._canvas.style.opacity = this.options.opacity ?? 0.72;
    this._reset();
    return this;
  },

  // Cheap live update for a slider: just adjusts CSS opacity on the
  // already-rendered canvas, no recompute of the underlying raster.
  setOpacity: function (opacity) {
    this.options.opacity = opacity;
    if (this._canvas) this._canvas.style.opacity = opacity;
    return this;
  },

  onRemove: function (map) {
    L.DomUtil.remove(this._canvas);
    map.off('moveend zoomend resize', this._reset, this);
  },

  _reset: function () {
    const topLeft = this._map.containerPointToLayerPoint([0, 0]);
    L.DomUtil.setPosition(this._canvas, topLeft);
    const size = this._map.getSize();
    this._canvas.width = size.x;
    this._canvas.height = size.y;
    this._draw();
  },

  _draw: function () {
    const ctx = this._canvas.getContext('2d');
    const w = this._canvas.width, h = this._canvas.height;
    ctx.clearRect(0, 0, w, h);
    if (!this._cells.length || w <= 0 || h <= 0) return;

    // Blend radius is defined in real-world METERS, not screen pixels, so
    // it stays a consistent "how far does one reading's influence reach"
    // at every zoom level - this is what stops zooming in from smearing
    // dense coverage into one giant blob: the blend radius shrinks in
    // screen-pixel terms right along with it, at the same rate real
    // inter-point spacing grows on screen.
    const sigmaMeters = this.options.sigmaMeters || 3.2;
    const metersPerPixel = 156543.03392 * Math.cos(this._map.getCenter().lat * Math.PI / 180) / Math.pow(2, this._map.getZoom());
    const sigma = Math.min(60, Math.max(6, sigmaMeters / metersPerPixel));
    const step = this.options.gridStep || 3;      // px - render resolution (coarser = faster)
    const maxDist = sigma * 2.2;
    const twoSigma2 = 2 * sigma * sigma;

    // Project data cells to screen space, bucketed by a grid sized to
    // maxDist so we only ever have to check a point's own bucket + the 8
    // neighbors, instead of every cell for every pixel.
    const bucketSize = maxDist;
    const buckets = new Map();
    for (const c of this._cells) {
      const pt = this._map.latLngToContainerPoint([c.lat, c.lon]);
      if (pt.x < -bucketSize || pt.y < -bucketSize || pt.x > w + bucketSize || pt.y > h + bucketSize) continue;
      const bx = Math.floor(pt.x / bucketSize), by = Math.floor(pt.y / bucketSize);
      const key = bx + '_' + by;
      let arr = buckets.get(key);
      if (!arr) { arr = []; buckets.set(key, arr); }
      arr.push({ x: pt.x, y: pt.y, t: c.avgT });
    }
    if (!buckets.size) return;

    const img = ctx.createImageData(w, h);
    const data = img.data;
    const maxDist2 = maxDist * maxDist;

    for (let gy = 0; gy < h; gy += step) {
      const by0 = Math.floor(gy / bucketSize);
      for (let gx = 0; gx < w; gx += step) {
        const bx0 = Math.floor(gx / bucketSize);
        let wsum = 0, tsum = 0;
        for (let dbx = -1; dbx <= 1; dbx++) {
          for (let dby = -1; dby <= 1; dby++) {
            const arr = buckets.get((bx0 + dbx) + '_' + (by0 + dby));
            if (!arr) continue;
            for (let i = 0; i < arr.length; i++) {
              const p = arr[i];
              const ddx = p.x - gx, ddy = p.y - gy;
              const d2 = ddx * ddx + ddy * ddy;
              if (d2 > maxDist2) continue;
              const wgt = Math.exp(-d2 / twoSigma2);
              wsum += wgt;
              tsum += wgt * p.t;
            }
          }
        }
        if (wsum < 0.02) continue; // no meaningful nearby data - stay transparent

        const avg = clamp01(tsum / wsum);
        const [r, g, b] = colorForT(avg).match(/\d+/g).map(Number);
        // Ramp alpha in over the first bit of weight so isolated points
        // don't look like hard-edged discs, then hold steady. Overall
        // opacity is applied separately via CSS (see setOpacity) so the
        // slider doesn't need to re-run this whole computation.
        const alpha = Math.round(Math.min(1, wsum / 0.5) * 255);

        const xEnd = Math.min(gx + step, w), yEnd = Math.min(gy + step, h);
        for (let yy = gy; yy < yEnd; yy++) {
          let idx = (yy * w + gx) * 4;
          for (let xx = gx; xx < xEnd; xx++, idx += 4) {
            data[idx] = r; data[idx + 1] = g; data[idx + 2] = b; data[idx + 3] = alpha;
          }
        }
      }
    }
    ctx.putImageData(img, 0, 0);
  },
});

function renderHeatmap(fixes, metric) {
  const cells = aggregateToGrid(fixes, metric, 3); // ~3m cells
  heatLayer = new QualityHeatLayer(cells.map(c => ({ lat: c.lat, lon: c.lon, avgT: c.avgT })), { opacity: heatOpacity }).addTo(map);
}

let currentPoints = [];

function loadCSVText(text, name) {
  const rows = parseCSV(text);
  currentPoints = toPoints(rows);
  document.getElementById('filename-label').textContent = name;
  render(currentPoints);
}

// ---------- Wire up UI ----------
document.getElementById('metric-select').addEventListener('change', (e) => {
  currentMetric = e.target.value;
  render(currentPoints);
});

const opacityControl = document.getElementById('opacity-control');
const opacitySlider = document.getElementById('opacity-slider');

document.getElementById('view-select').addEventListener('change', (e) => {
  currentView = e.target.value;
  opacityControl.style.display = currentView === 'heatmap' ? 'flex' : 'none';
  render(currentPoints);
});

opacitySlider.addEventListener('input', (e) => {
  heatOpacity = e.target.value / 100;
  if (heatLayer) heatLayer.setOpacity(heatOpacity);
});

document.getElementById('fit-btn').addEventListener('click', () => {
  const fixes = usableFixes(currentPoints);
  if (fixes.length) {
    map.fitBounds(L.latLngBounds(fixes.map(p => [p.lat, p.lon])), { padding: [40, 40] });
  }
});

document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => loadCSVText(evt.target.result, file.name);
  reader.readAsText(file);
});

const dropzone = document.getElementById('dropzone');
let dragCounter = 0;
window.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; dropzone.classList.add('active'); });
window.addEventListener('dragover', (e) => { e.preventDefault(); });
window.addEventListener('dragleave', (e) => { dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropzone.classList.remove('active'); } });
window.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  dropzone.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => loadCSVText(evt.target.result, file.name);
  reader.readAsText(file);
});

// ---------- Init ----------
initMap();
loadCSVText(EMBEDDED_CSV, 'combined_gps_log-clean.csv');

// Guard against gappy/misaligned tiles caused by the map computing its size
// before the surrounding flex layout (and any fonts/CSS) has fully settled.
window.addEventListener('load', () => map.invalidateSize());
setTimeout(() => map.invalidateSize(), 300);
</script>
</body>
</html>
